name: Build and Push Docker Image
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - master
      - develop

  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version tag to build'
        required: true
        type: string


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.version }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: hk-eco-web-app
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ inputs.version }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ inputs.version }}

      - name: Output image URI
        run: echo "Image URI:${{ steps.login-ecr.outputs.registry }}/hk-eco-web-app:${{ inputs.version }}"  >>$GITHUB_OUTPUT
