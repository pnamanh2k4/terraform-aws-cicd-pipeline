<!DOCTYPE html>
<html>

<head>
    <title>HK-ECO - Eco Green Products</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f8f4; }
        .header { background-color: green; color: white; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>

<body>
    <div class="header">
        <h1 style="margin: 0;">HK-ECO</h1>
        <p>Eco Green Solutions for a Sustainable Future</p>
    </div>

    <div class="container">
        <h2 style="color:green; text-align:center;">Welcome to HK-ECO</h2>
        <p style="text-align:center; color:#666;">Your trusted source for eco-friendly green products</p>

        <form action="/api/login" method="POST">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>

            <input type="submit" value="Login" style="background-color:green; color:white; padding:10px 20px; border:none; cursor:pointer; border-radius:4px;">
            <input type="reset" value="Reset" style="background-color:#ccc; padding:10px 20px; border:none; cursor:pointer; border-radius:4px;">
        </form>
    </div>
</body>

</html>
